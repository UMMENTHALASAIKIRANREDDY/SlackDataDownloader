# Full-stack deployment: Spring Boot backend + nginx (frontend SPA + /api proxy + TLS) + certbot.
# Usage on the server:
#   1) cp .env.example .env            and fill DOMAIN + LETSENCRYPT_EMAIL
#   2) cp backend/.env.example backend/.env   and fill Slack tokens
#   3) bash deploy/init-letsencrypt.sh        (one-time, issues the TLS cert)
#   4) docker compose up -d --build

services:
  backend:
    build: ./backend
    image: slackdownloader-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Always bind 8081 inside the container regardless of .env.
      - SERVER_PORT=8081
    expose:
      - "8081"
    volumes:
      - backend_exports:/app/exports
    networks:
      - appnet

  web:
    build:
      context: ./frontend
      args:
        # Empty => browser uses relative /api (proxied here). Same-origin, no CORS.
        VITE_API_BASE_URL: ""
    image: slackdownloader-web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - DOMAIN=${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot
    networks:
      - appnet

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot
    # Renew twice a day; nginx picks up renewed certs on its own reload cycle.
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'
    networks:
      - appnet

volumes:
  backend_exports:

networks:
  appnet:
